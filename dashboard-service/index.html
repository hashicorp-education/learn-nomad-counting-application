<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counting Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .count-display {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 60px 40px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .count-number {
            font-size: 5em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .count-label {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .button-container {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        button {
            flex: 1;
            padding: 15px 30px;
            font-size: 1.1em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-increment {
            background: #667eea;
            color: white;
        }

        .btn-increment:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-refresh {
            background: #48bb78;
            color: white;
        }

        .btn-refresh:hover {
            background: #38a169;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(72, 187, 120, 0.4);
        }

        .info-section {
            background: #f7fafc;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            font-weight: 600;
            color: #4a5568;
        }

        .info-value {
            color: #667eea;
            font-family: 'Courier New', monospace;
        }

        .status {
            text-align: center;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .status.success {
            background: #c6f6d5;
            color: #22543d;
        }

        .status.error {
            background: #fed7d7;
            color: #742a2a;
        }

        .status.loading {
            background: #bee3f8;
            color: #2c5282;
        }

        .footer {
            text-align: center;
            color: #718096;
            font-size: 0.9em;
            margin-top: 20px;
        }

        @media (max-width: 600px) {
            .count-number {
                font-size: 3em;
            }

            h1 {
                font-size: 2em;
            }

            .button-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔢 Counting Dashboard</h1>
        
        <div id="status" class="status loading">Connecting to counting service...</div>
        
        <div class="count-display">
            <div class="count-number" id="countNumber">0</div>
            <div class="count-label">Total Count</div>
        </div>

        <div class="button-container">
            <button class="btn-increment" onclick="incrementCount()">
                ➕ Increment Count
            </button>
            <button class="btn-refresh" onclick="refreshCount()">
                🔄 Refresh
            </button>
        </div>

        <div class="info-section">
            <h3 style="margin-bottom: 15px; color: #2d3748;">Service Information</h3>
            <div class="info-row">
                <span class="info-label">Architecture:</span>
                <span class="info-value" id="architecture">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">Platform:</span>
                <span class="info-value" id="platform">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">Go Version:</span>
                <span class="info-value" id="goVersion">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">Last Updated:</span>
                <span class="info-value" id="timestamp">-</span>
            </div>
        </div>

        <div class="footer">
            Built for multi-architecture deployment<br>
            Supports AMD64, ARM64
        </div>
    </div>

    <!-- Load configuration from Nomad template (if available) -->
    <script src="config.js"></script>

    <script>
        // Configuration - can be overridden by environment
        const COUNTING_SERVICE_URL = window.COUNTING_SERVICE_URL ||
            (window.location.hostname === 'localhost' 
                ? 'http://localhost:9001' 
                : 'http://counting-service:9001');

        console.log('Counting Service URL:', COUNTING_SERVICE_URL);

        // Update the display with count data
        function updateDisplay(data) {
            document.getElementById('countNumber').textContent = data.count;
            document.getElementById('architecture').textContent = data.architecture || '-';
            document.getElementById('platform').textContent = data.platform || '-';
            document.getElementById('goVersion').textContent = data.go_version || '-';
            document.getElementById('timestamp').textContent = 
                data.timestamp ? new Date(data.timestamp).toLocaleString() : '-';
        }

        // Show status message
        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
        }

        // Increment count
        async function incrementCount() {
            try {
                showStatus('Incrementing count...', 'loading');
                const response = await fetch(COUNTING_SERVICE_URL);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                updateDisplay(data);
                showStatus('✓ Count incremented successfully', 'success');
            } catch (error) {
                console.error('Error incrementing count:', error);
                showStatus(`✗ Error: ${error.message}`, 'error');
            }
        }

        // Refresh count (get current count without incrementing)
        async function refreshCount() {
            try {
                showStatus('Refreshing...', 'loading');
                const response = await fetch(`${COUNTING_SERVICE_URL}/health`);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                document.getElementById('architecture').textContent = data.architecture || '-';
                document.getElementById('platform').textContent = data.platform || '-';
                document.getElementById('goVersion').textContent = data.go_version || '-';
                document.getElementById('timestamp').textContent = 
                    data.timestamp ? new Date(data.timestamp).toLocaleString() : '-';
                showStatus('✓ Service is healthy', 'success');
            } catch (error) {
                console.error('Error refreshing:', error);
                showStatus(`✗ Error: ${error.message}`, 'error');
            }
        }

        // Initial load
        window.addEventListener('load', () => {
            refreshCount();
        });

        // Auto-refresh every 30 seconds
        setInterval(refreshCount, 30000);
    </script>
</body>
</html>
